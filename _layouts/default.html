<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <meta name="author" content="Kevin Martínez-Folgar">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta property="og:description" content="{{ site.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
  </head>
  <body>

    <!-- Scroll progress bar -->
    <div id="scroll-progress" aria-hidden="true"></div>

    <header class="site-header" id="site-header">
      <div class="shell site-header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">Kevin Martínez-Folgar</a>
        <nav class="top-nav" aria-label="Primary navigation">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/about/' | relative_url }}">About</a>
          <a href="{{ '/publications/' | relative_url }}">Publications</a>
          <a href="{{ '/cv/' | relative_url }}">CV</a>
          <a href="{{ '/appearances/' | relative_url }}">Media</a>
        </nav>
      </div>
    </header>

    <main class="shell main-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="shell site-footer-inner">
        <p>&copy; {{ "now" | date: "%Y" }} Kevin Martínez-Folgar, MD, PhD</p>
        <div class="footer-links">
          <a href="https://scholar.google.com/citations?user=cAUPpBgAAAAJ" target="_blank" rel="noopener">Google Scholar</a>
          <a href="https://orcid.org/0000-0001-9262-298X" target="_blank" rel="noopener">ORCID</a>
          <a href="https://github.com/kmfolgar" target="_blank" rel="noopener">GitHub</a>
        </div>
      </div>
    </footer>

    <script>
      // ── Scroll progress bar ────────────────────────────
      const progressBar = document.getElementById('scroll-progress');
      const header = document.getElementById('site-header');

      function updateProgress() {
        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
        progressBar.style.width = pct + '%';

        // Header shadow on scroll
        if (scrollTop > 10) {
          header.classList.add('scrolled');
        } else {
          header.classList.remove('scrolled');
        }
      }

      window.addEventListener('scroll', updateProgress, { passive: true });
      updateProgress();

      // ── Scroll-reveal animations ───────────────────────
      const animEls = document.querySelectorAll('[data-animate]');

      if (animEls.length > 0) {
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.08, rootMargin: '0px 0px -40px 0px' }
        );

        animEls.forEach(el => observer.observe(el));
      }

      // ── Active nav link ────────────────────────────────
      const navLinks = document.querySelectorAll('.top-nav a');
      const currentPath = window.location.pathname.replace(/\/$/, '') || '/';

      navLinks.forEach(link => {
        const linkPath = new URL(link.href).pathname.replace(/\/$/, '') || '/';
        if (linkPath === currentPath) {
          link.style.color = 'var(--brand-strong)';
          link.style.background = 'rgba(13, 107, 126, 0.08)';
          link.style.borderColor = 'rgba(13, 107, 126, 0.2)';
        }
      });
    </script>

  </body>
</html>
