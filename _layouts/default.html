<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != "Home" %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="author" content="Kevin Martínez-Folgar">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta name="theme-color" content="#0B1622">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>
<body>

  <div id="scroll-progress" aria-hidden="true"></div>

  <header class="site-header on-dark" id="site-header">
    <div class="shell site-header-inner">
      <a class="brand" href="{{ '/' | relative_url }}">Kevin Martínez-Folgar</a>
      <nav class="top-nav" aria-label="Primary navigation">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/publications/' | relative_url }}">Publications</a>
        <a href="{{ '/cv/' | relative_url }}">CV</a>
        <a href="{{ '/appearances/' | relative_url }}">Media</a>
      </nav>
    </div>
  </header>

  <main id="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="shell site-footer-inner">
      <p class="footer-copy">&copy; {{ "now" | date: "%Y" }} Kevin Martínez-Folgar, MD, PhD</p>
      <div class="footer-links">
        <a href="{{ site.google_scholar }}" target="_blank" rel="noopener">Google Scholar</a>
        <a href="https://orcid.org/{{ site.orcid }}" target="_blank" rel="noopener">ORCID</a>
        <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </footer>

  <script>
    // ── Scroll progress ───────────────────────────────────────
    const bar    = document.getElementById('scroll-progress');
    const header = document.getElementById('site-header');

    // Detect if homepage (has .opener section)
    const hasOpener = !!document.querySelector('.opener');

    function onScroll() {
      const st  = window.scrollY;
      const max = document.documentElement.scrollHeight - window.innerHeight;
      bar.style.width = max > 0 ? (st / max * 100) + '%' : '0%';

      // Header theme switch
      if (hasOpener) {
        const openerH = document.querySelector('.opener')?.offsetHeight ?? 0;
        if (st > openerH * 0.7) {
          header.classList.replace('on-dark', 'on-light');
        } else {
          header.classList.replace('on-light', 'on-dark');
        }
      } else {
        header.classList.replace('on-dark', 'on-light');
      }
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll(); // init

    // ── Scroll-reveal ─────────────────────────────────────────
    const animEls = document.querySelectorAll('[data-animate]');
    if (animEls.length) {
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add('visible');
            obs.unobserve(e.target);
          }
        });
      }, { threshold: 0.07, rootMargin: '0px 0px -40px 0px' });
      animEls.forEach(el => obs.observe(el));
    }

    // ── Active nav ────────────────────────────────────────────
    const cur = window.location.pathname.replace(/\/$/, '') || '/';
    document.querySelectorAll('.top-nav a').forEach(a => {
      const lp = new URL(a.href).pathname.replace(/\/$/, '') || '/';
      if (lp === cur) a.classList.add('active');
    });
  </script>

</body>
</html>
