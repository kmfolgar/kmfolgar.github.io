<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <style>
      .site-nav {
        margin-top: 1rem;
      }
      .site-nav ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .site-nav li {
        margin: 0 0 0.45rem 0;
      }
      .site-nav a {
        font-weight: 600;
        text-decoration: none;
      }
      .site-nav a.is-active {
        text-decoration: underline;
      }
      .profile-avatar {
        width: 120px;
        border-radius: 8px;
        margin-bottom: 0.8rem;
      }
      @media (max-width: 960px) {
        .site-nav ul {
          display: flex;
          flex-wrap: wrap;
          gap: 0.75rem;
        }
        .site-nav li {
          margin: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <header>
        {% if site.avatar %}
        <img class="profile-avatar" src="{{ site.avatar }}" alt="{{ site.title }}">
        {% endif %}
        <h1><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
        <p>{{ site.description }}</p>

        <nav class="site-nav" aria-label="Primary">
          <ul>
            <li><a href="{{ site.baseurl }}/" {% if page.url == "/" %}class="is-active"{% endif %}>Home</a></li>
            <li><a href="{{ site.baseurl }}/about/" {% if page.url contains "/about" %}class="is-active"{% endif %}>About</a></li>
            <li><a href="{{ site.baseurl }}/cv/" {% if page.url contains "/cv" %}class="is-active"{% endif %}>CV</a></li>
            <li><a href="{{ site.baseurl }}/publications/" {% if page.url contains "/publications" %}class="is-active"{% endif %}>Research</a></li>
            <li><a href="{{ site.baseurl }}/appearences/" {% if page.url contains "/appearences" %}class="is-active"{% endif %}>Appearances</a></li>
            <li><a href="{{ site.baseurl }}/blog/" {% if page.url contains "/blog" or page.layout == "post" %}class="is-active"{% endif %}>Blog</a></li>
          </ul>
        </nav>
      </header>

      <section>
        {{ content }}
      </section>

      <footer>
        <p><small>&copy; {{ "now" | date: "%Y" }} {{ site.title }}</small></p>
      </footer>
    </div>
    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>
  </body>
</html>
