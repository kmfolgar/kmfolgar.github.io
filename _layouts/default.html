<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="shell site-header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.name }}</a>
        <nav class="top-nav" aria-label="Primary">
          <a href="{{ '/#overview' | relative_url }}">Overview</a>
          <a href="{{ '/#expertise' | relative_url }}">Expertise</a>
          <a href="{{ '/#selected-work' | relative_url }}">Selected Work</a>
          <a href="{{ '/#contact' | relative_url }}">Contact</a>
        </nav>
      </div>
    </header>

    <main class="shell main-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="shell site-footer-inner">
        <p>&copy; {{ "now" | date: "%Y" }} {{ site.name }}</p>
        <p class="meta-note">For complete publication history, see Google Scholar.</p>
      </div>
    </footer>
  </body>
</html>
